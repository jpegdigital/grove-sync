# Video Sync Producer configuration
#
# Per-channel sync tunables (storage budget, duration filters, scoring alpha)
# live in the curated_channels table in the database.
# This file only holds truly global settings: API params and quota limits.

producer:
  # Stop paginating after this many consecutive videos past the retention window.
  early_stop_tolerance: 3

  # Number of channels to refresh per rolling run.
  channels_per_run: 5

api:
  # YouTube Data API page size (max 50)
  page_size: 50

  # videos.list enrichment batch size (max 50)
  enrichment_batch_size: 50

  # Concurrent channel fetches (I/O-bound, 5-10 is safe)
  max_workers: 8

  # Retry on 429/5xx errors
  max_retries: 3
  retry_backoff_base: 2  # exponential: 2s, 4s, 8s

quota:
  daily_limit: 10000
  warn_threshold: 8000

db:
  # Supabase query pagination batch size
  page_size: 1000

  # Enqueue batch size for sync_queue inserts
  enqueue_batch_size: 100
